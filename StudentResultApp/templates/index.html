<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            min-height: 100vh;
        }

        .card {
            border-radius: 20px;
        }

        .title {
            font-weight: bold;
            color: #0d6efd;
        }

        .btn-custom {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg p-4">

                <h2 class="text-center title mb-4">
                    📚 Student Result Management System
                </h2>

                <form action="/result" method="POST">

                    <!-- Student Name -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Student Name</label>
                        <input type="text"
                               name="student_name"
                               class="form-control"
                               placeholder="Enter Student Name"
                               required>
                    </div>

                    <!-- English -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">English</label>
                        <input type="number"
                               name="english"
                               class="form-control"
                               min="0"
                               max="100"
                               required>
                    </div>

                    <!-- Tamil -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Tamil</label>
                        <input type="number"
                               name="tamil"
                               class="form-control"
                               min="0"
                               max="100"
                               required>
                    </div>

                    <!-- Maths -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Maths</label>
                        <input type="number"
                               name="maths"
                               class="form-control"
                               min="0"
                               max="100"
                               required>
                    </div>

                    <!-- Science -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Science</label>
                        <input type="number"
                               name="science"
                               class="form-control"
                               min="0"
                               max="100"
                               required>
                    </div>

                    <!-- Social -->
                    <div class="mb-4">
                        <label class="form-label fw-bold">Social</label>
                        <input type="number"
                               name="social"
                               class="form-control"
                               min="0"
                               max="100"
                               required>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-custom">
                            Calculate Result
                        </button>
                    </div>

                </form>

            </div>

            <!-- Footer -->
            <div class="text-center mt-3 text-dark">
                <small>
                    Developed by <strong>Steve Joshua T</strong> using Python Flask & Bootstrap
                </small>
            </div>

        </div>

    </div>

</div>

</body>
</html>
